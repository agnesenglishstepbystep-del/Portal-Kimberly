<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimberly | Semana 1 · Prática Guiada</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:       #1e3651;
    --teal:       #2a7c7c;
    --gold:       #c9a84c;
    --cream:      #f8f5ef;
    --cream-back: #edf4f4;
    --text-dark:  #1e3651;
    --text-mid:   #4a6070;
    --text-light: #7a95a5;
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(201,168,76,.2);
    flex-shrink: 0;
  }

  .header-label {
    color: rgba(255,255,255,.6);
    font-size: 12px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
  }

  .header-label span { color: var(--gold); }

  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,.08);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    padding: 7px 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.55);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 17px;
    transition: all .2s;
    font-family: Arial, sans-serif;
  }

  .mode-btn.active {
    background: var(--gold);
    color: var(--navy);
    font-weight: bold;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 40px 40px;
  }

  /* ══════════════════════════════
     MODO AULA
  ══════════════════════════════ */
  #aula-mode {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 620px;
  }

  .card-counter {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    margin-bottom: 20px;
  }

  /* Flip container */
  .card-wrap {
    width: 100%;
    height: 340px;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 28px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .55s ease;
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
  }

  /* Front */
  .card-front {
    background: var(--cream);
    justify-content: space-between;
  }

  .label-tag {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    font-family: Arial, sans-serif;
    margin-bottom: 8px;
  }

  .cenario-text {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.65;
  }

  .phrase-block {
    text-align: center;
    padding: 12px 0;
  }

  .phrase-en {
    font-size: 44px;
    font-weight: bold;
    color: var(--navy);
    letter-spacing: -.5px;
    line-height: 1.15;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12px;
    letter-spacing: .5px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: background .2s;
  }

  .audio-btn:hover { background: #215f5f; }

  .flip-hint {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: .8px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
  }

  /* Back */
  .card-back {
    background: var(--cream-back);
    transform: rotateY(180deg);
    justify-content: center;
    gap: 24px;
    border: 2px solid rgba(42,124,124,.18);
  }

  .back-block { display: flex; flex-direction: column; gap: 6px; }

  .traducao-text {
    font-size: 30px;
    font-weight: bold;
    color: var(--navy);
  }

  .sensacao-text {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.65;
  }

  /* Navigation */
  .card-nav {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.08);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }

  .nav-btn:hover:not(:disabled) {
    background: rgba(201,168,76,.25);
    border-color: var(--gold);
  }

  .nav-btn:disabled { opacity: .25; cursor: default; }

  .nav-info {
    color: rgba(255,255,255,.7);
    font-size: 13px;
    letter-spacing: 1px;
    min-width: 48px;
    text-align: center;
    font-family: Arial, sans-serif;
  }

  /* ══════════════════════════════
     MODO REVISÃO
  ══════════════════════════════ */
  #revisao-mode {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1080px;
  }

  .revisao-hint {
    color: rgba(255,255,255,.45);
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    margin-bottom: 24px;
  }

  .revisao-hint span { color: var(--gold); }

  .revisao-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    width: 100%;
  }

  @media (max-width: 860px) {
    .revisao-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Mini cards */
  .mini-wrap {
    height: 210px;
    perspective: 800px;
    cursor: pointer;
  }

  .mini-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s ease;
  }

  .mini-inner.flipped { transform: rotateY(180deg); }

  .mini-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .mini-front {
    background: var(--cream);
    justify-content: space-between;
  }

  .mini-num {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    font-family: Arial, sans-serif;
  }

  .mini-cenario {
    font-size: 11px;
    color: var(--text-mid);
    line-height: 1.5;
    flex: 1;
    margin: 8px 0 6px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .mini-phrase {
    font-size: 19px;
    font-weight: bold;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .mini-audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: .5px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: all .2s;
    align-self: flex-start;
  }

  .mini-audio-btn:hover { background: var(--teal); color: #fff; }

  .mini-btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .mini-download-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: .5px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    text-decoration: none;
    transition: all .2s;
  }

  .mini-download-btn:hover { background: var(--gold); color: var(--navy); }

  .mini-back {
    background: var(--cream-back);
    transform: rotateY(180deg);
    justify-content: center;
    gap: 12px;
    border: 2px solid rgba(42,124,124,.18);
  }

  .mini-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    font-family: Arial, sans-serif;
    margin-bottom: 4px;
  }

  .mini-traducao {
    font-size: 17px;
    font-weight: bold;
    color: var(--navy);
  }

  .mini-sensacao {
    font-size: 11px;
    color: var(--text-mid);
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="header-label">
    Kimberly · Mentoria VIP &nbsp;|&nbsp; <span>Semana 1 · Who I Am</span> &nbsp;·&nbsp; Prática Guiada
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-aula"    onclick="setMode('aula')">Aula</button>
    <button class="mode-btn"        id="btn-revisao" onclick="setMode('revisao')">Revisão</button>
  </div>
</header>

<main>

  <!-- AULA -->
  <div id="aula-mode">
    <div class="card-counter" id="counter">Card 01 / 08</div>

    <div class="card-wrap" onclick="flipMain()">
      <div class="card-inner" id="main-inner">

        <div class="card-face card-front">
          <div>
            <div class="label-tag">Cenário</div>
            <div class="cenario-text" id="main-cenario"></div>
          </div>
          <div class="phrase-block">
            <div class="phrase-en" id="main-phrase"></div>
          </div>
          <div class="card-footer">
            <button class="audio-btn" id="main-audio" onclick="playAudio(event)">
              ▶ &nbsp;Ouvir
            </button>
            <span class="flip-hint">Clique para ver o verso</span>
          </div>
        </div>

        <div class="card-face card-back">
          <div class="back-block">
            <div class="label-tag">Tradução</div>
            <div class="traducao-text" id="main-traducao"></div>
          </div>
          <div class="back-block">
            <div class="label-tag">Sensação da frase</div>
            <div class="sensacao-text" id="main-sensacao"></div>
          </div>
        </div>

      </div>
    </div>

    <div class="card-nav">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&#8592;</button>
      <span class="nav-info" id="nav-info">1 / 8</span>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">&#8594;</button>
    </div>
  </div>

  <!-- REVISÃO -->
  <div id="revisao-mode">
    <div class="revisao-hint">
      <span>Todos os cards</span> &nbsp;·&nbsp; clique para ver o verso
    </div>
    <div class="revisao-grid" id="revisao-grid"></div>
  </div>

</main>

<audio id="player"></audio>

<script>
const cards = [
  {
    cenario:  "Uma amiga pergunta no WhatsApp como você está depois de um dia longo. Você responde:",
    frase:    "I'm tired.",
    audio:    "S01_PraticaGuiada_Card01_Im_tired.mp3",
    traducao: "Estou cansada.",
    sensacao: "Use quando você quer falar do seu estado agora. A sensação é: eu, neste momento, cansada."
  },
  {
    cenario:  "Em uma viagem ou chamada com alguém de outro país, a pessoa pergunta de onde você é. Você responde:",
    frase:    "I'm from Brazil.",
    audio:    "S01_PraticaGuiada_Card02_Im_from_Brazil.mp3",
    traducao: "Sou do Brasil.",
    sensacao: "A frase coloca sua origem dentro da conversa. Você está dizendo de onde vem."
  },
  {
    cenario:  "A aula vai começar e alguém pergunta se você pode começar. Você responde:",
    frase:    "I'm ready.",
    audio:    "S01_PraticaGuiada_Card03_Im_ready.mp3",
    traducao: "Estou pronta.",
    sensacao: "Use quando você quer mostrar que já pode começar. A sensação é de preparo."
  },
  {
    cenario:  "Uma amiga pergunta como você está hoje e você quer responder de forma simples e positiva:",
    frase:    "I'm happy.",
    audio:    "S01_PraticaGuiada_Card04_Im_happy.mp3",
    traducao: "Estou feliz.",
    sensacao: "Use para falar de uma sensação emocional positiva no momento."
  },
  {
    cenario:  "A pessoa quer começar agora, mas você ainda precisa de um minuto. Você responde:",
    frase:    "I'm not ready.",
    audio:    "S01_PraticaGuiada_Card05_Im_not_ready.mp3",
    traducao: "Não estou pronta.",
    sensacao: "A frase mostra que ainda não é o momento de começar. Você precisa de mais um pouco de tempo."
  },
  {
    cenario:  "Um amigo manda mensagem perguntando onde você está. Você responde:",
    frase:    "I'm at home.",
    audio:    "S01_PraticaGuiada_Card06_Im_at_home.mp3",
    traducao: "Estou em casa.",
    sensacao: "At home funciona como um bloco: em casa, no seu espaço."
  },
  {
    cenario:  "Em uma conversa simples durante uma viagem ou evento, alguém pergunta o que você faz. Você responde:",
    frase:    "I'm a business owner.",
    audio:    "S01_PraticaGuiada_Card07_Im_a_business_owner.mp3",
    traducao: "Sou empresária.",
    sensacao: "Use para apresentar sua identidade profissional de forma simples. Business owner funciona como bloco para \"empresária\"."
  },
  {
    cenario:  "Alguém faz uma pergunta e você ainda não sabe a resposta. Você responde:",
    frase:    "I'm not sure.",
    audio:    "S01_PraticaGuiada_Card08_Im_not_sure.mp3",
    traducao: "Não tenho certeza.",
    sensacao: "Use quando você não quer travar, mas também não quer afirmar algo sem certeza. É uma frase curta e muito útil em conversas reais."
  }
];

let idx  = 0;
let mode = 'aula';

function loadCard(i) {
  const c = cards[i];
  document.getElementById('main-inner').classList.remove('flipped');
  document.getElementById('main-cenario').textContent  = c.cenario;
  document.getElementById('main-phrase').textContent   = c.frase;
  document.getElementById('main-traducao').textContent = c.traducao;
  document.getElementById('main-sensacao').textContent = c.sensacao;
  document.getElementById('main-audio').dataset.src    = c.audio;
  const n = String(i + 1).padStart(2, '0');
  document.getElementById('counter').textContent  = `Card ${n} / 08`;
  document.getElementById('nav-info').textContent = `${i + 1} / 8`;
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === cards.length - 1;
}

function flipMain() {
  document.getElementById('main-inner').classList.toggle('flipped');
}

function navigate(dir) {
  const ni = idx + dir;
  if (ni >= 0 && ni < cards.length) { idx = ni; loadCard(idx); }
}

function playAudio(e) {
  e.stopPropagation();
  const src = e.currentTarget.dataset.src;
  const p   = document.getElementById('player');
  p.src = src;
  p.play().catch(() => {});
}

function playMiniAudio(e, src) {
  e.stopPropagation();
  const p = document.getElementById('player');
  p.src = src;
  p.play().catch(() => {});
}

function buildRevisao() {
  const grid = document.getElementById('revisao-grid');
  grid.innerHTML = '';
  cards.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'mini-wrap';
    const num = String(i + 1).padStart(2, '0');
    wrap.innerHTML = `
      <div class="mini-inner" id="mini-${i}">
        <div class="mini-face mini-front">
          <div class="mini-num">Card ${num}</div>
          <div class="mini-cenario">${c.cenario}</div>
          <div class="mini-phrase">${c.frase}</div>
          <div class="mini-btn-row">
            <button class="mini-audio-btn" onclick="playMiniAudio(event,'${c.audio}')">▶ Ouvir</button>
            <a class="mini-download-btn" href="${c.audio}" download>⬇ Baixar</a>
          </div>
        </div>
        <div class="mini-face mini-back">
          <div>
            <div class="mini-label">Tradução</div>
            <div class="mini-traducao">${c.traducao}</div>
          </div>
          <div>
            <div class="mini-label">Sensação da frase</div>
            <div class="mini-sensacao">${c.sensacao}</div>
          </div>
        </div>
      </div>`;
    wrap.onclick = () => document.getElementById(`mini-${i}`).classList.toggle('flipped');
    grid.appendChild(wrap);
  });
}

function setMode(m) {
  mode = m;
  document.getElementById('aula-mode').style.display    = m === 'aula'    ? 'flex' : 'none';
  document.getElementById('revisao-mode').style.display = m === 'revisao' ? 'flex' : 'none';
  document.getElementById('btn-aula').classList.toggle('active',    m === 'aula');
  document.getElementById('btn-revisao').classList.toggle('active', m === 'revisao');
  if (m === 'revisao') buildRevisao();
}

// Teclado
document.addEventListener('keydown', e => {
  if (mode !== 'aula') return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === ' ')          { e.preventDefault(); flipMain(); }
});

loadCard(0);
</script>
</body>
</html>
