<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construindo o Meu Listening — Kimberly Mentoria VIP</title>
<!--
  Bloco "Construindo o Meu Listening" / playlist da Lily — acumulativa.
  Reforma de 20/07/2026 (decisões de Agnes):
  · A página mostra SÓ os textos dos dias que a aluna já estudou (o texto novo entra
    quando o dia dele é concluído) — a playlist cresce sozinha, sem spoiler.
  · Botão único "Ouvir a playlist de hoje": toca as faixas liberadas em sequência,
    com avanço automático. Tocar numa faixa começa a playlist a partir dela.
  · O "Mostrar texto" foi removido — os textos escritos moram no Caderno de Práticas.
  · Registro da ESCUTA DO DIA (dado do "dia exemplar" da videira): cada faixa ouvida
    até o fim conta pro dia; todas as liberadas ouvidas hoje → escutas_do_dia[data]=true.
    Nada trava — é só prêmio.
  Áudios audio/Lily_SXX_TextoNN.mp3 — geração na fase de áudio; até lá cada faixa
  mostra "chega em breve" e é pulada na sequência.
-->
<link rel="stylesheet" href="styles.css">
<style>
  body{ padding-bottom:60px; }
  .wrap{ max-width:680px; padding:30px 18px; }
  .intro{ text-align:center; margin-bottom:24px; }
  .intro h1{ color:var(--azul); font-size:1.7rem; margin-bottom:8px; }
  .intro p{ color:#5a6b7a; font-size:.95rem; line-height:1.5; }

  .painel{ background:#fff; border-radius:18px; box-shadow:var(--sombra); padding:24px; text-align:center; margin-bottom:20px; }
  .painel .btn-dourado{ font-size:1rem; padding:14px 28px; }
  .painel audio{ width:100%; margin-top:16px; }
  .status-escuta{ margin-top:12px; font-size:.9rem; color:#5a6b7a; }
  .status-escuta.feita{ color:var(--verde-escuro); font-weight:bold; }

  .faixas{ display:flex; flex-direction:column; gap:10px; }
  .faixa{ background:#fff; border-radius:14px; box-shadow:var(--sombra); padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; cursor:pointer; transition:.2s; }
  .faixa:hover{ transform:translateY(-1px); }
  .faixa.tocando{ outline:2px solid var(--dourado); }
  .faixa .titulo{ color:var(--azul); font-weight:bold; font-size:.95rem; }
  .faixa .estado{ font-size:.8rem; color:#9aa3ad; white-space:nowrap; }
  .faixa .estado.ouvida{ color:var(--verde-escuro); font-weight:bold; }
  .faixa .estado.breve{ color:#c77; }

  .em-breve{ text-align:center; color:#9aa3ad; font-size:.88rem; padding:20px; background:#fff; border-radius:18px; box-shadow:var(--sombra); margin-top:16px; }
</style>
</head>
<body>

<header class="topbar">
  <span class="brand"><img class="logo" src="logo_marca.webp" alt="">Kimberly | <b>Mentoria VIP</b></span>
  <div class="topbar-acoes">
    <a href="index.html">← Início</a>
    <a href="#" onclick="sair();return false;">Sair</a>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    <h1>🎧 Construindo o Meu Listening</h1>
    <p>A playlist da Lily. Aperte o play, deixe rolar — não precisa entender cada palavra.</p>
  </div>

  <div class="painel" id="painel">
    <button class="btn-dourado" id="btnPlaylist">▶ Ouvir a playlist de hoje</button>
    <audio id="player" controls style="display:none"></audio>
    <p class="status-escuta" id="statusEscuta"></p>
  </div>

  <div class="faixas" id="faixas"></div>
  <div class="em-breve" id="rodape">Novos textos da Lily chegam a cada novo Dia.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- Persistência (local-first + sync Supabase) — §8 da especificação ---------- */
const SB_URL="https://yhsntdsdifpcozfpdfcu.supabase.co";
const SB_KEY="sb_publishable_aHINXeQ9NT_vXMamxc8GFw_iLZvOZKE";
const sb=supabase.createClient(SB_URL,SB_KEY);
let STUDENT=null;

async function requireLogin(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ location.href="Login.html"; return null; }
  STUDENT=session.user.id;
  return session;
}
async function sair(){ await sb.auth.signOut(); location.href="Login.html"; }

const Progress={
  cache:{},
  async load(){
    try{this.cache=JSON.parse(localStorage.getItem("kim_progress_"+STUDENT)||"{}");}catch(e){this.cache={};}
    try{const {data}=await sb.from("student_progress").select("progress").eq("student_id",STUDENT).single();
        if(data&&data.progress){this.cache=data.progress;localStorage.setItem("kim_progress_"+STUDENT,JSON.stringify(this.cache));}}catch(e){}
    return this.cache;
  },
  get(k,def){return (k in this.cache)?this.cache[k]:def;},
  async set(k,v){
    this.cache[k]=v; localStorage.setItem("kim_progress_"+STUDENT,JSON.stringify(this.cache));
    try{await sb.from("student_progress").upsert({student_id:STUDENT,progress:this.cache,updated_at:new Date().toISOString()});}catch(e){}
  }
};

/* Catálogo da playlist — Semana 1 (Textos #1–#5, Acervo KIM-S01-LILY-T01 a T05).
   O texto N pertence ao Dia N: entra na playlist quando o dia dele é concluído. */
const textos=[
  { id:'texto01', dia:1, titulo:'Texto #1 — Who I Am',        audio:'audio/Lily_S01_Texto01.mp3' },
  { id:'texto02', dia:2, titulo:'Texto #2 — Como estou agora', audio:'audio/Lily_S01_Texto02.mp3' },
  { id:'texto03', dia:3, titulo:'Texto #3 — Onde estou',       audio:'audio/Lily_S01_Texto03.mp3' },
  { id:'texto04', dia:4, titulo:'Texto #4 — Quem eu sou',      audio:'audio/Lily_S01_Texto04.mp3' },
  { id:'texto05', dia:5, titulo:"Texto #5 — I'm not...",       audio:'audio/Lily_S01_Texto05.mp3' }
];

function $(s){return document.querySelector(s);}
const hoje=new Date().toLocaleDateString('sv-SE'); // AAAA-MM-DD no fuso da aluna

let liberados=[];       // textos já destravados (dias estudados)
let filaIdx=-1;         // posição atual na playlist (índice em `liberados`)
const player=document.getElementById('player');

function liberado(t){
  return !!(Progress.get('dia'+t.dia+'_completedAt',null) || Progress.get('lily_textos_ouvidos',{})[t.id]);
}
function escutasDeHoje(){
  const reg=Progress.get('escuta_diaria',{});
  return reg[hoje]||{};
}
function estadoFaixa(t,i){
  if(i===filaIdx && !player.paused) return {txt:'♪ tocando', cls:''};
  if(t.semAudio) return {txt:'chega em breve', cls:'breve'};
  if(escutasDeHoje()[t.id]) return {txt:'ouvida hoje ✓', cls:'ouvida'};
  return {txt:'', cls:''};
}

function renderFaixas(){
  const box=$('#faixas'); box.innerHTML='';
  liberados.forEach((t,i)=>{
    const e=estadoFaixa(t,i);
    const div=document.createElement('div');
    div.className='faixa'+(i===filaIdx?' tocando':'');
    div.innerHTML=`<span class="titulo">${t.titulo}</span><span class="estado ${e.cls}">${e.txt}</span>`;
    div.addEventListener('click',()=>tocar(i));
    box.appendChild(div);
  });
  atualizarStatus();
}

function atualizarStatus(){
  const el=$('#statusEscuta');
  if(!liberados.length){ el.textContent=''; return; }
  const comAudio=liberados.filter(t=>!t.semAudio);
  if(!comAudio.length){
    el.textContent='Os áudios da Lily chegam em breve.';
    el.classList.remove('feita');
    return;
  }
  if(Progress.get('escutas_do_dia',{})[hoje]){
    el.textContent='✓ Escuta de hoje completa — até amanhã!';
    el.classList.add('feita');
  }else{
    const deHoje=escutasDeHoje();
    const n=comAudio.filter(t=>deHoje[t.id]).length;
    el.textContent=`Escuta de hoje: ${n} de ${comAudio.length} faixas.`;
    el.classList.remove('feita');
  }
}

async function marcarOuvidaHoje(t){
  const reg=Progress.get('escuta_diaria',{});
  const doDia=reg[hoje]||{};
  if(!doDia[t.id]){
    doDia[t.id]=true; reg[hoje]=doDia;
    await Progress.set('escuta_diaria',reg);
  }
  const comAudio=liberados.filter(x=>!x.semAudio);
  if(comAudio.length && comAudio.every(x=>doDia[x.id])){
    const dias=Progress.get('escutas_do_dia',{});
    if(!dias[hoje]){ dias[hoje]=true; await Progress.set('escutas_do_dia',dias); }
  }
  renderFaixas();
}

async function marcarConhecida(t){ // métrica histórica (selos 30/60 histórias)
  const o=Progress.get('lily_textos_ouvidos',{});
  if(!o[t.id]){ o[t.id]=true; await Progress.set('lily_textos_ouvidos',o); }
}

function proxima(){
  for(let i=filaIdx+1;i<liberados.length;i++){
    if(!liberados[i].semAudio){ tocar(i); return; }
  }
  filaIdx=-1;
  player.pause();
  renderFaixas();
}

function tocar(i){
  const t=liberados[i];
  if(!t || t.semAudio){ filaIdx=i; proxima(); return; }
  filaIdx=i;
  player.style.display='block';
  player.src=t.audio;
  player.play().then(()=>{ marcarConhecida(t); renderFaixas(); }).catch(()=>{});
}

player.addEventListener('ended', ()=>{ const t=liberados[filaIdx]; if(t) marcarOuvidaHoje(t); proxima(); });
player.addEventListener('error', ()=>{ const t=liberados[filaIdx]; if(t){ t.semAudio=true; } proxima(); });
player.addEventListener('pause', ()=>renderFaixas());
player.addEventListener('play', ()=>renderFaixas());

document.getElementById('btnPlaylist').addEventListener('click',()=>{
  const inicio=liberados.findIndex(t=>!t.semAudio);
  if(inicio>=0) tocar(inicio);
});

(async function(){
  const session = await requireLogin();
  if(!session) return;
  await Progress.load();

  liberados = textos.filter(liberado);

  if(!liberados.length){
    document.getElementById('btnPlaylist').style.display='none';
    $('#statusEscuta').textContent='Seu primeiro texto da Lily chega quando você concluir o Dia 1. 🎧';
    document.getElementById('rodape').style.display='none';
    return;
  }

  // Marca as faixas cujo áudio ainda não existe (fase de áudio futura)
  await Promise.all(liberados.map(async t=>{
    try{const r=await fetch(t.audio,{method:'HEAD'}); if(!r.ok) t.semAudio=true;}catch(e){ t.semAudio=true; }
  }));
  if(liberados.every(t=>t.semAudio)){
    document.getElementById('btnPlaylist').style.display='none';
  }

  renderFaixas();
})();
</script>
</body>
</html>
